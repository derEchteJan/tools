<!DOCTYPE html>
<html>
<head>
<title>Upload File</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/style.css">
<style>
#ta_text_input
{
    height: 400pt;
    resize: none;
}
#ta_text_input, #ta_file_path
{
    width: 100%;
    color: var(--text1);
    background-color: var(--surface2);
    border: 1px solid transparent;
    border-radius: 5pt;
    outline: none;
}
#ta_text_input:focus, #ta_file_path:focus
{
    border: 1px solid var(--text3);
    outline: none;
}
button, input
{
    color: var(--text1);
    background-color: var(--surface3);
    border-radius: 5pt;
    border: none;
    height: 20pt;
    width: 60pt;
}
#btn-save
{
    color: var(--surface1);
    background-color: var(--accent1);
}
div#main
{
    margin-left: 0;
    width: 100%;
}
</style>
</head>
<body onload="onLoad()">
<div id="sidebar" style="display:none;">
</div>
<div id="main">
    <div id="content">

        <h2>Upload File</h2>

        <pre>Path:</pre>
        <textarea id="ta_file_path" name="path" cols="256" rows="1" placeholder="path to save"></textarea><br>

        <pre>File:</pre>
        <form action='/.actions/upload.php' method='post' enctype='multipart/form-data'>
        Select file to upload:
        <input type='file' name="fileToUpload" id="fileToUpload"><br>
        <input type='submit' value='submit'></form>
    </div>
</div>
<script src="upload.js"></script>
</body>
</html>
